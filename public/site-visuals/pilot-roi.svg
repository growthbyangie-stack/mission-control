<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Pilot ROI scene</title>
  <desc id="desc">An illustration of a 14-day pilot timeline and measured results.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="0.5" stop-color="#fefce8"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#14532d" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="186" cy="166" r="96" fill="#bbf7d0" opacity="0.86"/>
  <circle cx="986" cy="616" r="122" fill="#bfdbfe" opacity="0.76"/>
  <g filter="url(#shadow)">
    <rect x="210" y="138" width="780" height="520" rx="38" fill="#ffffff"/>
    <rect x="276" y="220" width="648" height="86" rx="24" fill="#f8fafc"/>
    <rect x="314" y="257" width="490" height="14" rx="7" fill="url(#bar)"/>
    <g fill="#ffffff" stroke="#cbd5e1" stroke-width="10">
      <circle cx="332" cy="264" r="28"/>
      <circle cx="470" cy="264" r="28"/>
      <circle cx="608" cy="264" r="28"/>
      <circle cx="746" cy="264" r="28"/>
    </g>
    <g fill="#22c55e">
      <circle cx="332" cy="264" r="12"/>
      <circle cx="470" cy="264" r="12"/>
      <circle cx="608" cy="264" r="12"/>
    </g>
    <circle cx="746" cy="264" r="12" fill="#2563eb"/>
    <rect x="278" y="378" width="150" height="166" rx="22" fill="#ecfdf5"/>
    <rect x="478" y="330" width="150" height="214" rx="22" fill="#eff6ff"/>
    <rect x="678" y="286" width="150" height="258" rx="22" fill="#fef3c7"/>
    <g fill="#0f172a" opacity="0.65">
      <rect x="310" y="500" width="86" height="12" rx="6"/>
      <rect x="510" y="500" width="86" height="12" rx="6"/>
      <rect x="710" y="500" width="86" height="12" rx="6"/>
    </g>
  </g>
</svg>
